name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    # No paths-ignore — `test` is a required status check and must always run.

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  test:
    # Keep the historical `test` context while replacing its contents with the explicit portable
    # allowlist. This preserves branch protection across every slice of the stacked transition.
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
      # Contract tests run the scripts/ probes as subprocesses and assert on
      # JSON output + exit codes. They build their own fake-busdriver fixtures
      # (see tests/contract/test_gate.py) so the suite is hermetic — no real
      # Busdriver source tree required. Line coverage is intentionally not
      # collected: subprocess execution isn't traced by pytest-cov without
      # extra plumbing, so the contract assertions ARE the signal (see
      # .claude/CLAUDE.md). Codecov is N/A by design for this repo.
      - name: Install pytest
        run: pip install --quiet 'pytest==8.4.1'  # Pin version — reproducible CI, consistent with security.yml scanners
      - name: Run portable contract subset
        run: |
          python -B -I -m pytest -q -p no:cacheprovider \
            tests/contract/test_stack_portable_smoke.py

  compliance:
    # Supply-chain artifacts are a release/main concern, not a per-PR concern —
    # gate to push so unmerged code doesn't burn minutes generating an SBOM.
    if: github.event_name == 'push'
    needs: [test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: sbom.spdx.json
      - name: Trivy license scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: license
          severity: CRITICAL
          exit-code: 1
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scanners: vuln
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
